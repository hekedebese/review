<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script type="module" crossorigin src="/review/index.js"></script>

  <body>
    <section class="review">
      <div class="container">
        <h2 class="review-title">Відгуки клієнтів</h2>
        <p class="review-text">
          Дізнайтеся, що кажуть наші задоволені клієнти...

        <div class="swiper review-swiper">
          <ul class="swiper-wrapper review-list"></ul>

        <div class="review-controls">
          <div class="swiper-pagination review-pagination"></div>

          <button class="review-btn prev" type="button">

              <use xlink:href="#icon-arrow"></use>
            </svg>
          </button>
          <button class="review-btn next" type="button"></button>
        </div>
      </div>
    </section>
