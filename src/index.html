<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <section class="review">
      <div class="container">
        <h2 class="review-title">Відгуки клієнтів</h2>
        <p class="review-text">
          Дізнайтеся, що кажуть наші задоволені клієнти...
        </p>

        <div class="swiper review-swiper">
          <ul class="swiper-wrapper review-list"></ul>
        </div>

        <div class="review-controls">
          <div class="swiper-pagination review-pagination"></div>

          <button class="review-btn prev" type="button">
            <svg class="icon icon-arrow">
              <use href="#icon-arrow"></use>
            </svg>
          </button>
          <button class="review-btn next" type="button">
            <svg class="icon icon-arrow">
              <use href="#icon-arrow"></use>
            </svg>
          </button>
        </div>
      </div>
    </section>
    <script type="module" src="./main.js"></script>
  </body>
</html>
